<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yawp — month calendar</title>
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    if (dark) document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
<style>
  @font-face {
    font-family: "Inter";
    src: url("https://cdn.jsdelivr.net/npm/@fontsource-variable/inter@5/files/inter-latin-wght-normal.woff2") format("woff2");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }
  /* ---- LIGHT (our palette) ---- */
  :root {
    --bg:#ECECEE; --panel:#FFFFFF; --line:#ECECEE; --muted-bg:#F7F7F8;
    --txt:#18181B; --txt-2:#6B6B72; --txt-3:#B4B4BA; --accent:#7C3AED; --on-accent:#FFFFFF;

    --coral-f:rgba(242,97,90,.16);   --coral-t:#C81E1E;
    --orange-f:rgba(232,115,46,.17); --orange-t:#C2410C;
    --gold-f:rgba(245,197,24,.22);   --gold-t:#946C08;
    --green-f:rgba(41,180,93,.16);   --green-t:#15803D;
    --blue-f:rgba(91,141,239,.16);   --blue-t:#2347C4;
    --purple-f:rgba(176,125,240,.18);--purple-t:#6D28D9;
  }
  /* ---- DARK ---- */
  :root[data-theme="dark"] {
    --bg:#0E0E10; --panel:#161618; --line:rgba(255,255,255,.07); --muted-bg:rgba(255,255,255,.025);
    --txt:#E6E6E8; --txt-2:#8A8A90; --txt-3:#54545A; --accent:#8B5CF6; --on-accent:#FFFFFF;

    --coral-f:rgba(242,97,90,.16);   --coral-t:#F69089;
    --orange-f:rgba(232,115,46,.16); --orange-t:#F0A86A;
    --gold-f:rgba(245,197,24,.14);   --gold-t:#F2D45E;
    --green-f:rgba(41,180,93,.14);   --green-t:#6FD79A;
    --blue-f:rgba(91,141,239,.15);   --blue-t:#9DBAF6;
    --purple-f:rgba(176,125,240,.16);--purple-t:#C9AAF8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    font-family: "Inter", sans-serif; font-size: 13px; color: var(--txt);
    background: var(--bg); -webkit-font-smoothing: antialiased;
    padding: 48px; transition: background-color .22s ease;
  }
  .head { display: flex; align-items: center; justify-content: space-between; max-width: 1300px; margin: 0 auto 18px; }
  .title { color: var(--txt); font-size: 22px; font-weight: 700; }
  .theme-toggle { background: none; border: 0; padding: 0; cursor: pointer; color: var(--txt-3); display: inline-flex; transition: color .12s ease; }
  .theme-toggle:hover { color: var(--txt); }

  .cal { max-width: 1300px; margin: 0 auto; background: var(--panel); border-radius: 12px; overflow: hidden; border: 1px solid var(--line); transition: background-color .22s ease, border-color .22s ease; }
  .dow { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--line); }
  .dow div { padding: 14px 16px; color: var(--txt-2); font-size: 11px; letter-spacing: .06em; }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cell { min-height: 168px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 14px 14px 12px; display: flex; flex-direction: column; transition: background-color .22s ease, border-color .22s ease; }
  .cell:nth-child(7n) { border-right: none; }
  .grid > .cell:nth-last-child(-n+7) { border-bottom: none; }
  .cell .n { font-size: 15px; color: var(--txt); align-self: flex-start; }
  .cell.muted { background: var(--muted-bg); }
  .cell.muted .n { color: var(--txt-3); }
  .cell.today .n { background: var(--accent); color: var(--on-accent); border-radius: 8px; padding: 2px 9px; font-weight: 600; }

  .tags { margin-top: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
  .tag { font-size: 12px; padding: 2px 8px; border-radius: 5px; }
  .tag.blue   { background: var(--blue-f);   color: var(--blue-t); }
  .tag.green  { background: var(--green-f);  color: var(--green-t); }
  .tag.coral  { background: var(--coral-f);  color: var(--coral-t); }
  .tag.gold   { background: var(--gold-f);   color: var(--gold-t); }
  .tag.orange { background: var(--orange-f); color: var(--orange-t); }

  @media (max-width: 820px) { body { padding: 20px; } .cell { min-height: 120px; } }
</style>
</head>
<body>
  <div class="head">
    <div class="title" id="title">June 2026</div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light or dark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4V20ZM22 12C22 17.5228 17.5228 22 12 22C11.6252 22 11.2549 21.9793 10.8901 21.939C5.88912 21.3862 2 17.148 2 12C2 6.85205 5.88912 2.61382 10.8901 2.06098C11.2549 2.02066 11.6252 2 12 2C17.5228 2 22 6.47715 22 12Z" fill="currentColor"/></svg>
    </button>
  </div>

  <div class="cal">
    <div class="dow"><div>MON</div><div>TUE</div><div>WED</div><div>THUR</div><div>FRI</div><div>SAT</div><div>SUN</div></div>
    <div class="grid" id="grid"></div>
  </div>

<script>
  var YEAR = 2026, MONTH = 5, TODAY = 22;   // June 2026, today = the 22nd
  var EV = { note:{l:'Note',c:'blue'}, build:{l:'Build',c:'green'}, design:{l:'Design',c:'coral'},
             pin:{l:'Pin',c:'gold'}, draft:{l:'Draft',c:'orange'} };
  // events keyed by June date
  var events = {
    2:['note'], 4:['build'], 5:['note','design'], 9:['note','build'], 11:['pin'],
    13:['note'], 16:['design'], 17:['note'], 19:['note','build','design'], 20:['draft'],
    22:['note','build'], 23:['build'], 25:['note','pin'], 26:['draft'], 27:['build','design'], 30:['note']
  };

  var first = new Date(YEAR, MONTH, 1);
  var startOffset = (first.getDay() + 6) % 7;          // days back to Monday
  var start = new Date(YEAR, MONTH, 1 - startOffset);
  var rows = Math.ceil((startOffset + new Date(YEAR, MONTH + 1, 0).getDate()) / 7);

  var html = '';
  for (var i = 0; i < rows * 7; i++) {
    var dt = new Date(start); dt.setDate(start.getDate() + i);
    var inMonth = dt.getMonth() === MONTH;
    var isToday = inMonth && dt.getDate() === TODAY;
    var tags = '';
    if (inMonth && events[dt.getDate()]) {
      tags = events[dt.getDate()].map(function (k) {
        return '<span class="tag ' + EV[k].c + '">' + EV[k].l + '</span>';
      }).join('');
    }
    html += '<div class="cell' + (inMonth ? '' : ' muted') + (isToday ? ' today' : '') + '">' +
            '<span class="n">' + dt.getDate() + '</span>' +
            '<div class="tags">' + tags + '</div></div>';
  }
  document.getElementById('grid').innerHTML = html;

  document.getElementById('theme-toggle').addEventListener('click', function () {
    var root = document.documentElement;
    var dark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', dark ? 'light' : 'dark');
    localStorage.setItem('theme', dark ? 'light' : 'dark');
  });
</script>
</body>
</html>
